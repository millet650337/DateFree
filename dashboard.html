<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Free | 會員主控台</title>

<style>
:root {
    --primary-blue: #2563eb;
    --accent-orange: #ff6b6b;
    --accent-gradient: linear-gradient(45deg, #ff6b6b, #ff8e53);
    --text-dark: #2d3748;
    --text-gray: #4a5568;
    --bg-light: #f8fafc;
}

body {
    margin: 0;
    font-family: 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(180deg, #ffffff 0%, #fff0f0 100%);
    color: var(--text-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    overflow-x: hidden;
}

/* 導覽列 */
header {
    width: 100%; max-width: 1200px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px; box-sizing: border-box;
}
.logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
.logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; }
.logo-text { font-weight: bold; font-size: 20px; letter-spacing: 1px; color: var(--text-dark); }

.diamond-wrapper {
    transform: rotate(45deg); background: white; cursor: pointer;
    box-shadow: 10px 10px 30px rgba(255, 107, 107, 0.08);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 12px;
}
.diamond-wrapper:hover { transform: rotate(45deg) scale(1.08); box-shadow: 15px 15px 40px rgba(255, 107, 107, 0.15); }
.diamond-content { transform: rotate(-45deg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; overflow: hidden; border-radius: 50%; }

.profile-section { text-align: center; margin-top: 50px; margin-bottom: 70px; display: flex; flex-direction: column; align-items: center; }
.profile-diamond { width: 170px; height: 170px; border: 3px solid var(--accent-orange); }
.profile-img { width: 150%; height: 150%; object-fit: cover; }
.nickname { margin-top: 35px; font-size: 22px; font-weight: bold; color: var(--text-dark); }

.menu-section { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 20px; max-width: 1000px; }
.menu-item { width: 180px; height: 180px; border: 1px solid #ffe4e4; }
.menu-item:hover { background: var(--accent-gradient); }
.menu-item:hover .menu-text { color: white; }
.menu-text { font-size: 20px; font-weight: bold; color: var(--text-gray); transition: color 0.3s; }

.logout-btn { margin-top: 60px; margin-bottom: 40px; padding: 10px 30px; border: 1px solid var(--text-gray); border-radius: 30px; background: transparent; color: var(--text-gray); cursor: pointer; font-size: 16px; transition: all 0.3s; }
.logout-btn:hover { background: var(--text-dark); color: white; }

@media (max-width: 900px) {
    header { padding: 15px 20px; }
    .menu-section { gap: 30px; }
    .menu-item { width: 140px; height: 140px; }
    .profile-diamond { width: 140px; height: 140px; }
}
</style>
</head>

<body>

<header>
    <div class="logo-container" onclick="window.location.href='index.html'">
        <img src="S__18784267.jpg" alt="Date Free Logo" class="logo-img">
        <div class="logo-text">Date Free</div>
    </div>
</header>

<div class="profile-section">
    <div class="diamond-wrapper profile-diamond" onclick="window.location.href='profile.html'" title="設定個人資料">
        <div class="diamond-content" id="profileContent">
            <span style="font-size: 50px;">👤</span>
        </div>
    </div>
    <div class="nickname" id="nickname">載入中...</div>
    <div style="font-size:14px; color:gray; margin-top:8px;">點擊頭像編輯個人資料</div>
</div>

<div class="menu-section">
    <div class="diamond-wrapper menu-item" onclick="goToSurvey()">
        <div class="diamond-content"><span class="menu-text">填寫問卷</span></div>
    </div>
    <div class="diamond-wrapper menu-item" onclick="checkMatchResult()">
        <div class="diamond-content"><span class="menu-text">配對結果</span></div>
    </div>
    <div class="diamond-wrapper menu-item" onclick="window.location.href='chat.html'">
        <div class="diamond-content"><span class="menu-text">聊天室</span></div>
    </div>
    <div class="diamond-wrapper menu-item" onclick="alert('客服信箱：support@datefree.tw')">
        <div class="diamond-content"><span class="menu-text">聯繫我們</span></div>
    </div>
</div>

<button class="logout-btn" onclick="logout()">登出</button>

<script>
const API_BASE = "/api";
const token = localStorage.getItem("token");
let user = JSON.parse(localStorage.getItem("user"));

if (!token || !user) {
    alert("請先登入！");
    window.location.href = "index.html";
}

document.getElementById("nickname").innerText = user.name;

function loadProfile() {
    fetch(`${API_BASE}/profile`, { headers: { "Authorization": `Bearer ${token}` } })
    .then(res => res.json())
    .then(data => {
        if(data && data.photo_base64) {
            document.getElementById("profileContent").innerHTML = 
                `<img src="${data.photo_base64}" class="profile-img" alt="Profile">`;
        }
    })
    .catch(err => console.error("無法載入", err));
}
loadProfile(); 

function goToSurvey() { window.location.href = "survey.html"; }

function checkMatchResult() {
    alert("系統配對中...");
    fetch(`${API_BASE}/match`, { headers: { Authorization: `Bearer ${token}` } })
    .then(res => res.json())
    .then(data => {
        if (data.detail) { alert("⚠️ " + data.detail); return; }
        if (data.match) {
            alert(`🎉 配對成功\n\n對象：${data.match.name}\n分數：${data.match.score}%`);
        } else {
            alert(data.message);
        }
    })
    .catch(err => { alert("伺服器錯誤"); });
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    alert("已登出");
    window.location.href = "index.html";
}
</script>

</body>
</html>
