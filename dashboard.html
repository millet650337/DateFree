<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Free | 會員主控台</title>
<link rel="icon" href="datefreecircle.png" type="image/jpeg">
<style>
:root { --primary-blue: #2563eb; --accent-orange: #ff6b6b; --accent-gradient: linear-gradient(45deg, #ff6b6b, #ff8e53); --text-dark: #2d3748; --text-gray: #4a5568; --bg-light: #f8fafc; }
body { margin: 0; font-family: 'Microsoft JhengHei', sans-serif; background: linear-gradient(180deg, #ffffff 0%, #fff0f0 100%); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; }
header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; box-sizing: border-box; }
.logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
.logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; }
.logo-text { font-weight: bold; font-size: 20px; letter-spacing: 1px; color: var(--text-dark); }

.diamond-wrapper { transform: rotate(45deg); background: white; cursor: pointer; box-shadow: 10px 10px 30px rgba(255, 107, 107, 0.08); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 12px; }
.diamond-wrapper:hover { transform: rotate(45deg) scale(1.08); box-shadow: 15px 15px 40px rgba(255, 107, 107, 0.15); }
.diamond-content { transform: rotate(-45deg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; overflow: hidden; border-radius: 50%; }

.profile-section { text-align: center; margin-top: 50px; margin-bottom: 70px; display: flex; flex-direction: column; align-items: center; }
.profile-diamond { width: 170px; height: 170px; border: 3px solid var(--accent-orange); }
.profile-img { width: 150%; height: 150%; object-fit: cover; }
.nickname { margin-top: 35px; font-size: 22px; font-weight: bold; color: var(--text-dark); display: flex; align-items: center; justify-content: center; }

.menu-section { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 20px; max-width: 1000px; }
.menu-item { width: 180px; height: 180px; border: 1px solid #ffe4e4; }
.menu-item:hover { background: var(--accent-gradient); }
.menu-item:hover .menu-text { color: white; }
.menu-text { font-size: 20px; font-weight: bold; color: var(--text-gray); transition: color 0.3s; }

.logout-btn { margin-top: 60px; margin-bottom: 40px; padding: 10px 30px; border: 1px solid var(--text-gray); border-radius: 30px; background: transparent; color: var(--text-gray); cursor: pointer; font-size: 16px; transition: all 0.3s; }
.logout-btn:hover { background: var(--text-dark); color: white; }

/* 自介卡片 Modal CSS */
.card-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999; padding: 20px; box-sizing: border-box; }
.profile-card { background: white; border-radius: 20px; overflow: hidden; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.4s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.card-photo { width: 100%; height: 350px; object-fit: cover; background: #f1f5f9; display: block; }
.card-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
.card-body { padding: 25px 20px; }
.card-header-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
.card-name { font-size: 26px; font-weight: bold; color: var(--text-dark); margin: 0; display: flex; align-items: center; gap: 8px; }
.verified-icon { background: #1d9bf0; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; }
.card-score { background: #ffe4e4; color: var(--accent-orange); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
.card-meta { color: var(--text-gray); font-size: 15px; margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;}
.meta-badge { background: #f1f5f9; padding: 2px 8px; border-radius: 10px; font-size: 12px; color: var(--text-gray); border: 1px solid #e2e8f0; }
.card-details { font-size: 13px; color: #718096; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
.card-bio { font-size: 15px; line-height: 1.6; color: #4a5568; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.card-tag { background: white; border: 1px solid var(--accent-orange); color: var(--accent-orange); padding: 4px 12px; border-radius: 20px; font-size: 13px; }
.card-action { display: block; width: 100%; padding: 15px; background: var(--accent-gradient); color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; margin-top: 20px; text-decoration: none; box-sizing: border-box; }

@media (max-width: 900px) { header { padding: 15px 20px; } .menu-section { gap: 30px; } .menu-item { width: 140px; height: 140px; } .profile-diamond { width: 140px; height: 140px; } }

/* ==========================
   新增：主控台進場與毛玻璃特效
========================== */
/* 整體頁面柔和載入 */
body {
    animation: fadeInPage 0.8s ease-out;
}
@keyframes fadeInPage {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* 菱形選單漸次彈出 */
.menu-item {
    opacity: 0;
    transform: rotate(45deg) scale(0.5) translateY(50px);
    animation: popInDiamond 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

/* 利用 nth-child 創造時間差 (Stagger effect) */
.menu-item:nth-child(1) { animation-delay: 0.1s; }
.menu-item:nth-child(2) { animation-delay: 0.2s; }
.menu-item:nth-child(3) { animation-delay: 0.3s; }
.menu-item:nth-child(4) { animation-delay: 0.4s; }

@keyframes popInDiamond {
    to {
        opacity: 1;
        transform: rotate(45deg) scale(1) translateY(0);
    }
}

/* 讓配對卡片擁有「毛玻璃 (Glassmorphism)」的高級感 */
.profile-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.5);
}
</style>
</head>

<body>

<header>
    <div class="logo-container" onclick="window.location.href='index.html'">
        <img src="datefreelogo.png" alt="Date Free Logo" class="logo-img">
    </div>
</header>

<div class="profile-section">
    <div class="diamond-wrapper profile-diamond" onclick="window.location.href='profile.html'" title="設定個人資料">
        <div class="diamond-content" id="profileContent">
            <span style="font-size: 50px;">👤</span>
        </div>
    </div>
    <div class="nickname" id="nickname">載入中...</div>
    <div style="font-size:14px; color:gray; margin-top:8px;">點擊頭像編輯個人資料</div>
</div>

<div class="menu-section">
    <div class="diamond-wrapper menu-item" onclick="window.location.href='survey.html'">
        <div class="diamond-content"><span class="menu-text">填寫問卷</span></div>
    </div>
    <div class="diamond-wrapper menu-item" onclick="checkMatchResult()">
        <div class="diamond-content"><span class="menu-text">配對結果</span></div>
    </div>
    <div class="diamond-wrapper menu-item" onclick="window.location.href='chat.html'">
        <div class="diamond-content"><span class="menu-text">聊天室</span></div>
    </div>
    <div class="diamond-wrapper menu-item" onclick="alert('客服信箱：support@datefree.tw')">
        <div class="diamond-content"><span class="menu-text">聯繫我們</span></div>
    </div>
</div>

<button class="logout-btn" onclick="logout()">登出</button>

<div class="card-modal" id="matchModal" onclick="closeMatchModal(event)">
    <div class="profile-card" onclick="event.stopPropagation()">
        <button class="card-close" onclick="closeMatchModal(event)">✕</button>
        <img src="" id="cardPhoto" class="card-photo">
        <div class="card-body">
            <div class="card-header-info">
                <h2 class="card-name"><span id="cardName"></span> <span id="cardVerified" style="display:none;" class="verified-icon" title="已通過真人驗證">✔</span></h2>
                <div class="card-score">契合度 <span id="cardScore"></span>%</div>
            </div>
            <div class="card-meta">
                <span id="cardAge" style="font-weight:bold; color:var(--text-dark);"></span>
                <span id="cardHometown"></span>
                <span>• <span id="cardDept"></span> <span id="cardGrade"></span></span>
                <span id="cardMbti" class="meta-badge" style="display:none;"></span>
                <span id="cardZodiac" class="meta-badge" style="display:none;"></span>
                <span id="cardBlood" class="meta-badge" style="display:none;"></span>
            </div>
            <div class="card-details" id="cardDetails"></div>
            <div class="card-bio" id="cardBio"></div>
            <div class="card-tags" id="cardTags"></div>
            <a href="chat.html" class="card-action">開始聊天</a>
        </div>
    </div>
</div>

<script>
const API_BASE = "/api";
const token = localStorage.getItem("token");

function isTokenExpired(t) {
    if (!t) return true;
    try { const payload = JSON.parse(atob(t.split('.')[1])); return (Date.now() >= payload.exp * 1000); } catch (e) { return true; }
}

if (isTokenExpired(token)) {
    alert("登入狀態已過期，請重新登入！");
    localStorage.removeItem("token"); localStorage.removeItem("user"); window.location.href = "index.html";
}

let user = JSON.parse(localStorage.getItem("user"));
document.getElementById("nickname").innerText = user.name;

function loadProfile() {
    fetch(`${API_BASE}/profile`, { headers: { "Authorization": `Bearer ${token}` } })
    .then(res => res.json())
    .then(data => {
        if(data && data.photo_base64) {
            document.getElementById("profileContent").innerHTML = `<img src="${data.photo_base64}" class="profile-img" alt="Profile">`;
        }
        const verifiedBadge = data.is_verified ? '<span style="display:inline-block; background:#1d9bf0; color:white; border-radius:50%; width:18px; height:18px; text-align:center; line-height:18px; font-size:12px; margin-left:6px; vertical-align:middle; cursor:pointer;" title="已通過真人驗證">✔</span>' : '';
        document.getElementById("nickname").innerHTML = user.name + verifiedBadge;
    })
    .catch(err => console.error("無法載入", err));
}
loadProfile(); 

function calculateAge(birthdayStr) {
    if(!birthdayStr) return '?';
    const birth = new Date(birthdayStr); const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) { age--; }
    return age;
}

function checkMatchResult() {
    fetch(`${API_BASE}/match`, { headers: { Authorization: `Bearer ${token}` } })
    .then(res => res.json())
    .then(data => {
        if (data.detail) { alert("⚠️ " + data.detail); return; }
        if (data.match) { showProfileCard(data.match); } 
        else { alert(data.message); }
    })
    .catch(err => { alert("伺服器錯誤"); });
}

function showProfileCard(matchData) {
    document.getElementById("cardPhoto").src = matchData.photo_base64 || 'S__18784267.jpg';
    document.getElementById("cardName").innerText = matchData.name;
    document.getElementById("cardScore").innerText = matchData.score;
    document.getElementById("cardVerified").style.display = matchData.is_verified ? 'inline-flex' : 'none';
    
    document.getElementById("cardAge").innerText = matchData.birthday ? calculateAge(matchData.birthday) + "歲" : "年齡未知";
    document.getElementById("cardHometown").innerText = matchData.hometown ? " • " + matchData.hometown : "";
    document.getElementById("cardDept").innerText = matchData.department || '未設定系所';
    document.getElementById("cardGrade").innerText = matchData.grade || '';
    
    if(matchData.mbti) { document.getElementById("cardMbti").innerText = matchData.mbti; document.getElementById("cardMbti").style.display = 'inline-block'; } else { document.getElementById("cardMbti").style.display = 'none'; }
    if(matchData.zodiac) { document.getElementById("cardZodiac").innerText = matchData.zodiac; document.getElementById("cardZodiac").style.display = 'inline-block'; } else { document.getElementById("cardZodiac").style.display = 'none'; }
    if(matchData.blood_type) { document.getElementById("cardBlood").innerText = matchData.blood_type; document.getElementById("cardBlood").style.display = 'inline-block'; } else { document.getElementById("cardBlood").style.display = 'none'; }
    
    const detailsDiv = document.getElementById("cardDetails");
    detailsDiv.innerHTML = '';
    if(matchData.pet) detailsDiv.innerHTML += `<span>🐾 寵物: ${matchData.pet}</span>`;
    if(matchData.fitness) detailsDiv.innerHTML += `<span>💪 健身: ${matchData.fitness}</span>`;
    if(matchData.diet) detailsDiv.innerHTML += `<span>🍽️ 飲食: ${matchData.diet}</span>`;
    
    document.getElementById("cardBio").innerText = matchData.bio || '這個人很神秘，還沒寫自我介紹...';
    
    const tagsContainer = document.getElementById("cardTags");
    tagsContainer.innerHTML = '';
    if (matchData.tags && matchData.tags.length > 0) {
        matchData.tags.forEach(tag => { tagsContainer.innerHTML += `<span class="card-tag">#${tag}</span>`; });
    }
    document.getElementById("matchModal").style.display = 'flex';
}

function closeMatchModal(e) {
    if(e) e.stopPropagation();
    document.getElementById("matchModal").style.display = 'none';
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    alert("已登出");
    window.location.href = "index.html";
}
</script>

</body>
</html>
