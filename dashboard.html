<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Free | 會員主控台</title>

<style>
:root {
    --bg-color: #fafafa;
    --border-color: #333;
    --text-color: #333;
    --hover-bg: #ff6b6b;
    --hover-text: #ffffff;
}

body {
    margin: 0;
    background: var(--bg-color);
    font-family: 'Microsoft JhengHei';
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

.diamond-wrapper {
    transform: rotate(45deg);
    border:1px solid var(--border-color);
    background:white;
    cursor:pointer;
}

.diamond-content {
    transform: rotate(-45deg);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
}

.profile-section {
    text-align:center;
    margin-bottom:50px;
}

.profile-diamond {
    width:100px;
    height:100px;
}

.nickname {
    margin-top:20px;
    font-size:18px;
}

.menu-section {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.menu-item {
    width:120px;
    height:120px;
    margin:10px;
}

.menu-item:hover {
    background:var(--hover-bg);
}

.menu-text {
    font-size:14px;
}

.logout-btn {
    margin-top:50px;
    border:none;
    background:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="profile-section">
    <div class="diamond-wrapper profile-diamond">
        <div class="diamond-content">👤</div>
    </div>
    <div class="nickname" id="nickname">載入中...</div>
</div>

<div class="menu-section">
    <div class="diamond-wrapper menu-item" onclick="goToSurvey()">
        <div class="diamond-content"><span class="menu-text">填寫問卷</span></div>
    </div>

    <div class="diamond-wrapper menu-item" onclick="checkMatchResult()">
        <div class="diamond-content"><span class="menu-text">配對結果</span></div>
    </div>

    <div class="diamond-wrapper menu-item" onclick="alert('聊天功能開發中')">
        <div class="diamond-content"><span class="menu-text">聊天室</span></div>
    </div>

    <div class="diamond-wrapper menu-item" onclick="alert('support@datefree.tw')">
        <div class="diamond-content"><span class="menu-text">聯繫我們</span></div>
    </div>
</div>

<button class="logout-btn" onclick="logout()">登出</button>

<script>
const API_BASE = "/api";

// ==========================
// 1️⃣ 登入檢查（JWT）
// ==========================
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || !user) {
    alert("請先登入！");
    window.location.href = "index.html";
}

// 顯示名稱
document.getElementById("nickname").innerText =
    user.name + " (" + user.email + ")";

// ==========================
// 2️⃣ 導頁
// ==========================
function goToSurvey() {
    window.location.href = "survey.html";
}

// ==========================
// 3️⃣ 配對 API（JWT）
// ==========================
function checkMatchResult() {

    alert("系統配對中...");

    fetch(`${API_BASE}/match`, {
        headers: {
            Authorization: `Bearer ${token}`
        }
    })
    .then(res => res.json())
    .then(data => {

        if (data.detail) {
            alert("⚠️ " + data.detail);
            return;
        }

        if (data.match) {
            alert(
                `🎉 配對成功\n\n` +
                `對象：${data.match.name}\n` +
                `分數：${data.match.score}%`
            );
        } else {
            alert(data.message);
        }
    })
    .catch(err => {
        console.error(err);
        alert("伺服器錯誤");
    });
}

// ==========================
// 4️⃣ 登出
// ==========================
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");

    alert("已登出");
    window.location.href = "index.html";
}
</script>

</body>
</html>
