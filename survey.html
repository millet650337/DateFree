<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Free | 精準配對問卷</title>

<style>
body {
    font-family: 'Microsoft JhengHei';
    background:#f8f9fa;
    display:flex;
    justify-content:center;
    padding:20px;
}
.container {
    max-width:600px;
    width:100%;
    background:white;
    padding:20px;
    border-radius:10px;
}
button {
    padding:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
    <h2 id="title">問卷</h2>
    <div id="content"></div>

    <button onclick="prev()">上一步</button>
    <button onclick="next()" id="nextBtn">下一步</button>
</div>

<script>
// ==========================
// 🔐 登入檢查
// ==========================
const token = localStorage.getItem("token");

if (!token) {
    alert("請先登入！");
    window.location.href = "index.html";
}

// ==========================
// 問卷資料
// ==========================
const steps = [
{
    title:"性別",
    key:"gender",
    options:["男","女","非二元"]
},
{
    title:"未來",
    key:"future_status",
    options:["大學在讀","研究所","工作"]
},
{
    title:"金錢觀",
    key:"money_view",
    options:["AA","互請","男付","女付"]
},
{
    title:"約會目的",
    key:"dating_goal",
    options:["交友","穩定關係","曖昧"]
}
];

let i = 0;
let answers = {};

// ==========================
// 渲染
// ==========================
function render() {
    const step = steps[i];

    document.getElementById("title").innerText = step.title;

    let html = "";
    step.options.forEach(opt => {
        html += `
        <div>
            <input type="radio" name="q" value="${opt}"
            ${answers[step.key] === opt ? "checked" : ""}
            onchange="select('${step.key}','${opt}')">
            ${opt}
        </div>
        `;
    });

    document.getElementById("content").innerHTML = html;

    document.getElementById("nextBtn").innerText =
        i === steps.length - 1 ? "送出" : "下一步";
}

function select(key,val) {
    answers[key] = val;
}

// ==========================
// 下一步
// ==========================
function next() {

    if (i < steps.length - 1) {
        i++;
        render();
    } else {
        submitSurvey();
    }
}

// ==========================
// 上一步
// ==========================
function prev() {
    if (i > 0) {
        i--;
        render();
    }
}

// ==========================
// 🚀 送出問卷（JWT）
// ==========================
function submitSurvey() {

    const payload = {
        gender: answers.gender || "未提供",
        future_status: answers.future_status || "未提供",
        dealbreakers: [],
        bad_habits: [],
        money_view: answers.money_view || "未提供",
        boundaries: "【報備信任型】",
        dating_goal: answers.dating_goal || "未提供"
    };

    fetch("/api/survey", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":`Bearer ${token}`
        },
        body:JSON.stringify(payload)
    })
    .then(res=>res.json())
    .then(data=>{
        if (data.detail) {
            alert("錯誤："+data.detail);
            return;
        }

        alert("問卷完成！");
        window.location.href = "dashboard.html";
    })
    .catch(()=>{
        alert("伺服器錯誤");
    });
}

// 初始
render();
</script>

</body>
</html>
