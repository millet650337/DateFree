\<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Free | 精準配對問卷</title>
<link rel="icon" href="datefreecircle.png" type="image/jpeg">

<style>
:root {
    --text-dark: #2d3748;
    --text-gray: #4a5568;
    --accent-orange: #ff6b6b;
    --accent-gradient: linear-gradient(45deg, #ff6b6b, #ff8e53);
    --bg-light: #f8fafc;
}

body {
    margin: 0; font-family: 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(180deg, #ffffff 0%, #fff0f0 100%);
    color: var(--text-dark); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
}

/* 導覽列 */
header {
    width: 100%; max-width: 1200px;
    display: flex; justify-content: flex-start; align-items: center;
    padding: 20px 40px; box-sizing: border-box;
}
.logo-container { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    cursor: pointer; 
    height: 100%; /* 確保容器高度足夠 */
}
.logo-img { 
    height: 70px;       /* 增加高度，原為 40px */
    width: auto;        /* 寬度自動調整，確保比例正確 */
    max-width: 150px;   /* 設定最大寬度，避免過大 */
    border-radius: 0;   /* 移除 50% 的圓形裁切，顯示完整圖片 */
    object-fit: contain; /* 確保圖片在容器內完整顯示而不被縮放裁切 */
    transition: transform 0.3s ease; /* 加入微互動動畫 */
}
/* 增加滑鼠懸停時的縮放效果，增加商業質感 */
.logo-img:hover {
    transform: scale(1.05);
}
.logo-text { font-weight: bold; font-size: 20px; letter-spacing: 1px; color: var(--text-dark); }

/* 問卷容器 */
.container {
    max-width: 650px; width: 100%; background: white;
    padding: 40px; border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    margin-top: 10px; margin-bottom: 40px; box-sizing: border-box;
}

h2 { text-align: center; color: var(--text-dark); margin-top: 0; font-size: 24px; }
.step-indicator { text-align: center; color: var(--text-gray); font-size: 14px; margin-bottom: 30px; letter-spacing: 1px; }

/* ==========================
   表單群組 (獨立卡片化)
========================== */
.step-content { display: none; }
.step-content.active { display: block; animation: fadeIn 0.4s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.form-group { 
    margin-bottom: 30px; 
    padding: 25px; 
    background: #f8fafc; /* 給予每一題獨立的淺灰藍色背景 */
    border: 1px solid #e2e8f0; 
    border-radius: 16px; 
}
.form-group label.q-title { 
    display: block; 
    font-weight: bold; 
    margin-bottom: 15px; 
    font-size: 18px; 
    color: var(--text-dark); 
    border-left: 5px solid var(--accent-orange); /* 左側加上橘紅色標籤條，增加起點辨識度 */
    padding-left: 12px;
    line-height: 1.2;
}
.form-group .sub-text { 
    font-size: 13px; 
    color: #718096; 
    margin-top: -5px; 
    margin-bottom: 15px; 
    display: block; 
    padding-left: 17px; /* 與上方標題對齊 */
}

/* ==========================
   基礎輸入與選項按鈕
========================== */
select, input[type="number"], input[type="text"] {
    width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; font-family: inherit; margin-bottom: 10px; box-sizing: border-box;
}

.radio-group label {
    display: block; margin-bottom: 10px; padding: 12px 15px; 
    background: #ffffff; /* 選項改為純白，與外層淺灰背景產生對比 */
    border-radius: 10px; cursor: pointer; transition: all 0.2s; 
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02); /* 微微的浮凸感 */
}
.radio-group label:hover { 
    background: #fff0f0; 
    border-color: #ffb8b8;
}
.radio-group input[type="radio"] { 
    margin-right: 12px; transform: scale(1.2); accent-color: var(--accent-orange); 
}

/* ==========================
   地雷與興趣標籤 Tags
========================== */
.tags-container { display: flex; flex-wrap: wrap; gap: 10px; }
.tag-label {
    padding: 10px 20px; background: #ffffff; border-radius: 30px; cursor: pointer;
    font-size: 15px; transition: all 0.3s; border: 1px solid #e2e8f0; user-select: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
}
.tag-label input[type="checkbox"] { display: none; }
.tag-label.selected { background: var(--accent-gradient); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(255,107,107,0.3); }

/* 按鈕區 */
.btn-wrapper { display: flex; justify-content: space-between; margin-top: 40px; }
button {
    padding: 12px 30px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold;
    cursor: pointer; transition: all 0.3s;
}
.btn-prev { background: #e2e8f0; color: var(--text-dark); }
.btn-prev:hover { background: #cbd5e1; }
.btn-next { background: var(--accent-gradient); color: white; box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,0.4); }

@media (max-width: 768px) {
    header { padding: 15px 20px; }
    .container { margin-top: 0; width: 95%; padding: 25px; }
    .btn-wrapper { flex-direction: column-reverse; gap: 15px; }
    button { width: 100%; }
}

/* 輸入框與下拉選單的過渡動畫 */
select, input[type="number"], input[type="text"], input[type="date"], .bio-input {
    transition: all 0.3s ease;
    border: 2px solid #e2e8f0; /* 加粗一點點邊框 */
    background-color: #f8fafc;
}

/* 當使用者點擊輸入框時的發光效果 */
select:focus, input[type="number"]:focus, input[type="text"]:focus, input[type="date"]:focus, .bio-input:focus {
    outline: none;
    border-color: var(--accent-orange);
    background-color: #ffffff;
    box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15); /* 外圈柔和光暈 */
    transform: translateY(-2px); /* 微微浮起 */
}

/* 單選與複選按鈕的點擊回饋 */
.radio-group label:active, .tag-label:active {
    transform: scale(0.95); /* 按下去的時候微微縮小 */
}

/* 進度條外框 */
.progress-container {
    width: 100%;
    height: 8px;
    background: #f1f5f9;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
}
/* 進度條本體 */
.progress-bar {
    height: 100%;
    background: var(--accent-gradient);
    width: 14%; /* 預設步驟 1 的寬度 */
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

</style>
</head>

<body>

<header>
    <div class="logo-container" onclick="window.location.href='dashboard.html'">
        <img src="datefreelogo.png" alt="Date Free Logo" class="logo-img">
    </div>
</header>

<div class="container">
    <h2>深度三觀契合問卷</h2>
    <div class="step-indicator" id="stepIndicator">步驟 1 / 7：基礎資料與動態</div>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <form id="surveyForm">
        <div class="step-content active" id="step-1">
            <div class="form-group">
                <label class="q-title">1. 您的性別</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="男" required> 男</label>
                    <label><input type="radio" name="gender" value="女"> 女</label>
                    <label><input type="radio" name="gender" value="非二元"> 非二元</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">2. 身高與體重</label>
                <input type="number" name="height" placeholder="身高 (140-200 cm)" min="140" max="200" required>
                <input type="number" name="weight" placeholder="體重 (40-120 kg)" min="40" max="120" required>
            </div>
            <div class="form-group">
                <label class="q-title">3. 您的系級</label>
                <select name="dept" required>
                    <option value="">選擇院系</option>
                    <option value="資訊學院">資訊學院</option><option value="商學院">商學院</option>
                    <option value="文學院">文學院</option><option value="理學院">理學院</option>
                    <option value="工學院">工學院</option><option value="生科學院">生科學院</option>
                </select>
                <select name="grade" required>
                    <option value="">選擇年級</option>
                    <option value="一">一</option><option value="二">二</option>
                    <option value="三">三</option><option value="四">四</option>
                    <option value="五">五</option><option value="碩博">碩博</option>
                </select>
            </div>
            <div class="form-group">
                <label class="q-title">4. 未來 1-3 年動態 (核心篩選)</label>
                <div class="radio-group">
                    <label><input type="radio" name="future_status" value="大學在讀"> 大學在讀（專注學業/社團）</label>
                    <label><input type="radio" name="future_status" value="準備研究所"> 準備研究所（閉關讀書中）</label>
                    <label><input type="radio" name="future_status" value="職場新鮮人"> 職場新鮮人（畢業即就業）</label>
                    <label><input type="radio" name="future_status" value="國軍online"> 國軍 online（準備入伍/服役中）</label>
                    <label><input type="radio" name="future_status" value="海外漂泊"> 海外漂泊（出國留學/交換/工作）</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">5. 預計居住城市 (地理門檻)</label>
                <div class="radio-group">
                    <label><input type="radio" name="city" value="中部地區"> 中部地區（中/彰/投）</label>
                    <label><input type="radio" name="city" value="北部地區"> 北部地區（雙北/基/桃）</label>
                    <label><input type="radio" name="city" value="南部地區"> 南部地區（雲/嘉/南/高/屏）</label>
                    <label><input type="radio" name="city" value="東部或離島"> 東部或離島</label>
                    <label><input type="radio" name="city" value="國外"> 國外（Long-term overseas）</label>
                </div>
            </div>
        </div>

        <div class="step-content" id="step-2">
            <div class="form-group">
                <label class="q-title">1. 希望對象的性別</label>
                <div class="radio-group">
                    <label><input type="radio" name="target_gender" value="男"> 男</label>
                    <label><input type="radio" name="target_gender" value="女"> 女</label>
                    <label><input type="radio" name="target_gender" value="不限"> 不限</label>
                </div>
            </div>
           <div class="form-group">
                <label class="q-title">2. 期望身高區間 (可複選)</label>
                <div class="tags-container">
                    <label class="tag-label"><input type="checkbox" name="target_height" value="150以下"> 150以下</label>
                    <label class="tag-label"><input type="checkbox" name="target_height" value="150-160"> 150-160</label>
                    <label class="tag-label"><input type="checkbox" name="target_height" value="160-170"> 160-170</label>
                    <label class="tag-label"><input type="checkbox" name="target_height" value="170-180"> 170-180</label>
                    <label class="tag-label"><input type="checkbox" name="target_height" value="180-190"> 180-190</label>
                    <label class="tag-label"><input type="checkbox" name="target_height" value="190以上"> 190以上</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">3. 年齡差距接受範圍</label>
                <select name="target_age_diff">
                    <option value="不拘">不拘</option>
                    <option value="同歲">同歲即可</option>
                    <option value="相差三歲">相差三歲內</option>
                    <option value="相差五歲">相差五歲內</option>
                    <option value="相差十歲">相差十歲內</option>
                </select>
            </div>
            <div class="form-group">
                <label class="q-title">4. 能接受的對象未來狀態 (可複選)</label>
                <div class="tags-container">
                    <label class="tag-label"><input type="checkbox" name="target_future_status" value="大學在讀"> 大學在讀</label>
                    <label class="tag-label"><input type="checkbox" name="target_future_status" value="準備研究所"> 準備研究所</label>
                    <label class="tag-label"><input type="checkbox" name="target_future_status" value="職場新鮮人"> 職場新鮮人</label>
                    <label class="tag-label"><input type="checkbox" name="target_future_status" value="國軍online"> 國軍 online</label>
                    <label class="tag-label"><input type="checkbox" name="target_future_status" value="海外漂泊"> 海外漂泊</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">5. 能接受的對象嗜好習慣</label>
                <span class="sub-text">抽菸習慣：</span>
                <div class="radio-group" style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <label style="flex: 1;"><input type="radio" name="target_smoking" value="接受"> 接受</label>
                    <label style="flex: 1;"><input type="radio" name="target_smoking" value="不接受"> 不接受</label>
                </div>
                
                <span class="sub-text">喝酒頻率：</span>
                <div class="radio-group" style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <label style="flex: 1;"><input type="radio" name="target_drinking" value="不喝"> 不喝</label>
                    <label style="flex: 1;"><input type="radio" name="target_drinking" value="小酌"> 小酌</label>
                    <label style="flex: 1;"><input type="radio" name="target_drinking" value="頻繁"> 頻繁</label>
                    <label style="flex: 1;"><input type="radio" name="target_drinking" value="不拘"> 不拘</label>
                </div>

                <span class="sub-text">紋身：</span>
                <div class="radio-group" style="display: flex; gap: 10px;">
                    <label style="flex: 1;"><input type="radio" name="target_tattoo" value="接受"> 接受</label>
                    <label style="flex: 1;"><input type="radio" name="target_tattoo" value="不接受"> 不接受</label>
                </div>
            </div>
        </div>

        <div class="step-content" id="step-3">
            <div class="form-group">
                <label class="q-title">地雷自選區 (至多選擇 3 項)</label>
                <span class="sub-text">選擇你絕對無法容忍的特質，系統將嚴格避開。</span>
                <div class="tags-container" id="dealbreakers-container">
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【抽菸習慣】"> 【抽菸習慣】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【酗酒/頻繁買醉】"> 【酗酒/頻繁買醉】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【極度衛生髒亂】"> 【極度衛生髒亂】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【作息極端不合】"> 【作息極端不合】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【異性邊界感模糊】"> 【異性邊界感模糊】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【過度依賴/黏人】"> 【過度依賴/黏人】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【冷暴力/不溝通】"> 【冷暴力/不溝通】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【身高不符預期】"> 【身高不符預期】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【年齡差距過大】"> 【年齡差距過大】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【有明顯紋身】"> 【有明顯紋身】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【政治立場對立】"> 【政治立場對立】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【宗教信仰強求】"> 【宗教信仰強求】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【金錢觀極度計較】"> 【金錢觀極度計較 (鐵公雞)】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【極度情緒化】"> 【極度情緒化】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【負能量過重】"> 【負能量過重】</label>
                    <label class="tag-label"><input type="checkbox" name="dealbreakers" value="【大男人/大女人主義】"> 【大男人/大女人主義】</label>
                </div>
            </div>
        </div>

        <div class="step-content" id="step-4">
            <div class="form-group">
                <label class="q-title">1. 餐飲消費：日常午餐預算</label>
                <span class="sub-text">平時在興大附近，你覺得一頓「日常午餐」合理的預算上限是？</span>
                <div class="radio-group">
                    <label><input type="radio" name="lunch_budget" value="100元內"> 100元內 (學餐/便當)</label>
                    <label><input type="radio" name="lunch_budget" value="150-250元"> 150-250元 (特色小店)</label>
                    <label><input type="radio" name="lunch_budget" value="300元以上"> 300元以上 (精緻套餐)</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">2. 金錢觀：約會買單大哉問</label>
                <div class="radio-group">
                    <label><input type="radio" name="money_view" value="絕對 AA 制"> 絕對 AA 制（連 1 元都要算清楚）</label>
                    <label><input type="radio" name="money_view" value="互請制"> 互請制（這次你請，下次我請）</label>
                    <label><input type="radio" name="money_view" value="提議者付費"> 提議者付費（想吃大餐的人多出一點）</label>
                    <label><input type="radio" name="money_view" value="偏好對方大方"> 偏好對方大方（期待被照顧感）</label>
                    <label><input type="radio" name="money_view" value="願意主動買單"> 願意主動買單（更享受照顧對方的感覺）</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">3. 送禮儀式感</label>
                <div class="radio-group">
                    <label><input type="radio" name="gift_view" value="實用最重要"> 實用最重要（缺什麼買什麼）</label>
                    <label><input type="radio" name="gift_view" value="浪漫驚喜"> 浪漫驚喜（手作或昂貴名牌）</label>
                    <label><input type="radio" name="gift_view" value="吃頓好吃的就好"> 吃頓好吃的就好</label>
                    <label><input type="radio" name="gift_view" value="無需特別過"> 節日無需特別過，過好每天比較重要</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">4. 衝突處理機制</label>
                <div class="radio-group">
                    <label><input type="radio" name="conflict" value="當下決鬥型"> 【當下決鬥型】 必須現在講清楚，不帶情緒睡覺</label>
                    <label><input type="radio" name="conflict" value="冷靜緩衝型"> 【冷靜緩衝型】 先各自冷靜，過後再理性溝通</label>
                    <label><input type="radio" name="conflict" value="逃避包容型"> 【逃避/包容型】 怕吵架，習慣先道歉或冷戰等事情過去</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">5. 伴侶與異性邊界感</label>
                <div class="radio-group">
                    <label><input type="radio" name="boundaries" value="絕對純潔型"> 【絕對純潔型】 除了必要聯繫，不應與異性有私人往來</label>
                    <label><input type="radio" name="boundaries" value="報備信任型"> 【報備信任型】 可單獨吃飯/交友，但須事前報備且不曖昧</label>
                    <label><input type="radio" name="boundaries" value="社交自由型"> 【社交自由型】 完全信任，不干涉交友自由與深夜出遊</label>
                    <label><input type="radio" name="boundaries" value="精神至上型"> 【精神至上型】 肉體出軌勉強可原諒，但精神出軌絕對不行</label>
                    <label><input type="radio" name="boundaries" value="開放式關係"> 【開放式關係】 心在我這即可，身體偶爾出軌可當沒看到</label>
                </div>
            </div>
        </div>

        <div class="step-content" id="step-5">
            <div class="form-group">
                <label class="q-title">1. 遠距離接受度</label>
                <div class="radio-group">
                    <label><input type="radio" name="ldr" value="黏人型"> 【黏人型】 完全無法接受，必須同城市</label>
                    <label><input type="radio" name="ldr" value="階段型"> 【階段型】 短期可以(當兵/實習)，長期必須在一起</label>
                    <label><input type="radio" name="ldr" value="獨立型"> 【獨立型】 完全可以，只要信任，距離不是問題</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">2. 婚姻與生育觀</label>
                <div class="radio-group">
                    <label><input type="radio" name="marriage" value="家庭嚮往"> 【家庭嚮往】 渴望結婚並擁有小孩</label>
                    <label><input type="radio" name="marriage" value="兩人世界"> 【兩人世界】 想結婚但傾向不生小孩，專注彼此</label>
                    <label><input type="radio" name="marriage" value="隨緣不婚"> 【隨緣/不婚】 覺得結婚非必須，目前只想享受當下</label>
                </div>
            </div>
            <div class="form-group">
                <label class="q-title">3. 生理時鐘與社交電量</label>
                <select name="chronotype">
                    <option value="">請選擇作息...</option>
                    <option value="晨型人">【晨型人】 習慣早起，晚上11點準時斷線</option>
                    <option value="夜貓子">【夜貓子】 越夜越清醒，早上起不來</option>
                </select>
                <select name="social_energy">
                    <option value="">請選擇週末偏好...</option>
                    <option value="外向探索">【外向探索】 週末一定要出門，待在家會發霉</option>
                    <option value="居家宅系">【居家宅系】 週末只想在家看劇打電動，人群耗電</option>
                </select>
            </div>
        </div>

        <div class="step-content" id="step-6">
            <label class="q-title">請在各類別中選擇較偏好的一項：</label>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="int_energy" value="群居充電"> 群居充電 (派對、集體活動)</label>
                    <label><input type="radio" name="int_energy" value="遠離人群"> 遠離人群 (安靜、獨處愛好)</label>
                </div>
            </div>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="int_active" value="體育競技"> 體育競技 (健身、打球、登山)</label>
                    <label><input type="radio" name="int_active" value="城市漫遊"> 城市漫遊 (逛街、探店)</label>
                </div>
            </div>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="int_vibe" value="文藝靜態"> 文藝靜態 (展覽、咖啡廳)</label>
                    <label><input type="radio" name="int_vibe" value="聲色感官"> 聲色感官 (Live House、酒吧)</label>
                </div>
            </div>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="int_nerd" value="數位與模型"> 數位與模型 (遊戲、樂高)</label>
                    <label><input type="radio" name="int_nerd" value="機械美學"> 機械美學 (汽機車改裝研究)</label>
                </div>
            </div>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="int_life" value="精緻美食"> 精緻美食 (挖掘名店、排隊)</label>
                    <label><input type="radio" name="int_life" value="手作日常"> 手作日常 (烹飪、居家佈置)</label>
                </div>
            </div>
        </div>

        <div class="step-content" id="step-7">
            <div class="form-group">
                <label class="q-title">最後一題，您目前的約會目的？</label>
                <div class="radio-group">
                    <label><input type="radio" name="dating_goal" value="純粹交友"> 【純粹交友】 想認識新朋友，吃飯逛街不設限</label>
                    <label><input type="radio" name="dating_goal" value="穩定關係"> 【穩定關係】 以尋找長期伴侶為目標，希望能穩定走下去</label>
                    <label><input type="radio" name="dating_goal" value="浪漫曖昧"> 【浪漫曖昧】 享受約會與曖昧，不急著定下來</label>
                    <label><input type="radio" name="dating_goal" value="學術運動戰友"> 【學術/運動戰友】 目標導向，找人一起讀書或運動</label>
                </div>
            </div>
        </div>

        <div class="btn-wrapper">
            <button type="button" class="btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display:none;">上一步</button>
            <button type="button" class="btn-next" id="nextBtn" onclick="changeStep(1)">下一步</button>
        </div>
    </form>
</div>

<script>
const token = localStorage.getItem("token");
function isTokenExpired(t) {
    if (!t) return true;
    try {
        const payload = JSON.parse(atob(t.split('.')[1]));
        return (Date.now() >= payload.exp * 1000); // 檢查當前時間是否已大於過期時間
    } catch (e) { 
        return true; 
    }
}

if (isTokenExpired(token)) {
    alert("登入狀態已過期，請重新登入！");
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

// ====== 新增：自動載入歷史問卷紀錄 ======
function loadSurveyData() {
    fetch("/api/survey", {
        headers: { "Authorization": `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(data => {
        if (data.survey) {
            const s = data.survey;
            
            // 1. 填入一般文字、數字、下拉選單 (Select / Number)
            const inputNames = ['height', 'weight', 'dept', 'grade', 'chronotype', 'social_energy'];
            inputNames.forEach(key => {
                const el = document.querySelector(`[name="${key}"]`);
                if (el && s[key]) el.value = s[key];
            });

            // 2. 填入單選按鈕 (Radio)
            const radioNames = [
                'gender', 'future_status', 'city', 'target_gender', 
                'target_smoking', 'target_drinking', 'target_tattoo', 
                'lunch_budget', 'money_view', 'gift_view', 'conflict', 
                'boundaries', 'ldr', 'marriage', 'int_energy', 
                'int_active', 'int_vibe', 'int_nerd', 'int_life', 'dating_goal'
            ];
            radioNames.forEach(key => {
                if (s[key]) {
                    const el = document.querySelector(`input[name="${key}"][value="${s[key]}"]`);
                    if (el) el.checked = true;
                }
            });

            // 3. 填入複選按鈕與標籤樣式 (Checkbox Array)
            const checkboxNames = ['target_height', 'target_future_status', 'dealbreakers'];
            checkboxNames.forEach(key => {
                if (s[key] && Array.isArray(s[key])) {
                    s[key].forEach(val => {
                        const el = document.querySelector(`input[name="${key}"][value="${val}"]`);
                        if (el) {
                            el.checked = true;
                            // 若該選項外面包著 .tag-label，要加上 selected 讓背景亮起
                            if (el.parentElement.classList.contains('tag-label')) {
                                el.parentElement.classList.add('selected');
                            }
                        }
                    });
                }
            });
        }
    })
    .catch(err => console.error("無法載入歷史紀錄", err));
}

// 頁面載入時立刻抓取資料
loadSurveyData();
// ========================================


// 地雷標籤互動邏輯 (最多選3項)
const dealbreakerLimit = 3;
document.querySelectorAll('.tag-label input[type="checkbox"]').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
        // 確保只有地雷區有數量限制
        if (this.name === 'dealbreakers') {
            const checkedCount = document.querySelectorAll('.tag-label input[name="dealbreakers"]:checked').length;
            if (checkedCount > dealbreakerLimit) {
                this.checked = false;
                alert("至多只能選擇 3 項地雷喔！");
                return;
            }
        }
        
        // 樣式切換
        if (this.checked) this.parentElement.classList.add('selected');
        else this.parentElement.classList.remove('selected');
    });
});

// 分頁邏輯
let currentStep = 1;
const totalSteps = 7;

function changeStep(n) {
    const contents = document.querySelectorAll('.step-content');
    
    contents[currentStep - 1].classList.remove('active');
    currentStep += n;

    if (currentStep >= totalSteps) {
        document.getElementById('nextBtn').innerText = "完成並送出";
        document.getElementById('nextBtn').onclick = submitSurvey;
    } else {
        document.getElementById('nextBtn').innerText = "下一步";
        document.getElementById('nextBtn').onclick = () => changeStep(1);
    }

    if (currentStep <= 1) document.getElementById('prevBtn').style.display = "none";
    else document.getElementById('prevBtn').style.display = "block";

    contents[currentStep - 1].classList.add('active');
    document.getElementById('stepIndicator').innerText = `步驟 ${currentStep} / ${totalSteps}`;

    const progressPercentage = (currentStep / totalSteps) * 100;
    document.getElementById('progressBar').style.width = progressPercentage + '%';
}

// 收集資料並送出
function submitSurvey() {
    const form = document.getElementById("surveyForm");
    const formData = new FormData(form);
    
    // 1. 明確定義哪些欄位「必定是陣列 (複選題)」
    const arrayFields = ['target_height', 'target_future_status', 'dealbreakers'];
    const payload = {};

    // 初始化陣列欄位為空陣列
    arrayFields.forEach(field => payload[field] = []);

    // 2. 收集表單資料
    formData.forEach((value, key) => {
        if (arrayFields.includes(key)) {
            // 如果是設定好的複選題，一律塞進陣列裡 (不管勾了 1 個還是多個)
            payload[key].push(value);
        } else {
            // 單選或文字直接賦值
            payload[key] = value;
        }
    });

    fetch("/api/survey", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if (data.detail) {
            // 處理 Token 過期 (保留之前的防呆)
            if (data.detail === "Token 無效" || data.detail === "使用者不存在") {
                alert("登入狀態已過期，請重新登入！");
                localStorage.removeItem("token");
                localStorage.removeItem("user");
                window.location.href = "index.html";
                return;
            }
            
            // 處理 [object Object] 顯示問題：將 FastAPI 的陣列錯誤轉成可讀文字
            let errorMsg = data.detail;
            if (typeof data.detail === 'object') {
                errorMsg = JSON.stringify(data.detail, null, 2); 
                console.error("詳細錯誤內容：", data.detail); // 同時印在 F12 Console 方便除錯
            }
            
            alert("錯誤：" + errorMsg);
            return;
        }
        
        alert("問卷填寫完成，系統已更新您的交友演算法！");
        window.location.href = "dashboard.html";
    })
    .catch((err) => { 
        console.error(err);
        alert("伺服器連線錯誤，請稍後再試。"); 
    });
}
</script>
