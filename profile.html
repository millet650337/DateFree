<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Free | 個人資料設定</title>
<link rel="icon" href="S__18784267.jpg" type="image/jpeg">
<style>
:root { --text-dark: #2d3748; --text-gray: #4a5568; --accent-orange: #ff6b6b; --accent-gradient: linear-gradient(45deg, #ff6b6b, #ff8e53); --bg-light: #f8fafc; }
body { margin: 0; font-family: 'Microsoft JhengHei', sans-serif; background: linear-gradient(180deg, #ffffff 0%, #fff0f0 100%); color: var(--text-dark); min-height: 100vh; }
header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 1px solid #cbd5e1; background: transparent; }
.logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; }
.logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; }
.logo-text { font-weight: bold; font-size: 20px; letter-spacing: 1px; color: var(--text-dark); }
.logout-text { cursor: pointer; color: var(--text-gray); text-decoration: none; font-size: 16px; }
main { max-width: 600px; margin: 40px auto; padding: 0 20px; }
.photo-section { text-align: center; margin-bottom: 40px; }
.preview-box { width: 120px; height: 120px; border-radius: 50%; background: #f1f5f9; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 3px solid var(--accent-orange); }
.preview-box img { width: 100%; height: 100%; object-fit: cover; }
.upload-btn { padding: 6px 16px; background: #f1f5f9; border-radius: 20px; cursor: pointer; font-size: 14px; }
input[type="file"] { display: none; }
.bio-input { width: 100%; padding: 10px; margin-top: 20px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
.section-header { text-align: center; margin: 40px 0 30px 0; }
.dotted-decor { color: var(--text-gray); letter-spacing: 2px; font-size: 14px; }
.section-header h3 { font-size: 22px; font-weight: normal; margin: 10px 0 0 0; }
.form-group { margin-bottom: 25px; font-size: 16px; line-height: 1.8; }
.form-group label.title { display: inline-block; width: 140px; color: var(--text-dark); font-weight: bold;}
.form-group select, .form-group input[type="number"], .form-group input[type="text"], .form-group input[type="date"] { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 15px; }
.submit-btn-wrapper { display: flex; justify-content: center; gap: 20px; margin-top: 50px; margin-bottom: 50px; }
.preview-btn { padding: 12px 30px; background: #fff; color: var(--accent-orange); border: 2px solid var(--accent-orange); font-size: 18px; cursor: pointer; transition: all 0.3s; border-radius: 30px; font-weight: bold; }
.preview-btn:hover { background: #fff0f0; }
.submit-btn { padding: 12px 50px; background: var(--text-dark); color: white; border: none; font-size: 18px; cursor: pointer; transition: all 0.3s; border-radius: 30px; font-weight: bold; }
.submit-btn:hover { background: var(--accent-orange); }
.radio-group label { margin-right: 15px; cursor: pointer; }

/* 標籤的 CSS */
.tags-container { display: flex; flex-wrap: wrap; gap: 10px; margin-left: 20px; margin-top: 10px;}
.tag-label { padding: 6px 16px; background: #f1f5f9; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; user-select: none; color: var(--text-gray); }
.tag-label input[type="checkbox"] { display: none; }
.tag-label.selected { background: var(--accent-orange); color: white; box-shadow: 0 4px 10px rgba(255,107,107,0.3); }

/* 自介卡片預覽 Modal */
.card-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999; padding: 20px; box-sizing: border-box; }
.profile-card { background: white; border-radius: 20px; overflow: hidden; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.4s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.card-photo { width: 100%; height: 350px; object-fit: cover; background: #f1f5f9; display: block; }
.card-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
.card-body { padding: 25px 20px; }
.card-header-info { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
.card-name { font-size: 26px; font-weight: bold; color: var(--text-dark); margin: 0; display: flex; align-items: center; gap: 8px; }
.verified-icon { background: #1d9bf0; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; }
.card-score { background: #ffe4e4; color: var(--accent-orange); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
.card-meta { color: var(--text-gray); font-size: 15px; margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;}
.meta-badge { background: #f1f5f9; padding: 2px 8px; border-radius: 10px; font-size: 12px; color: var(--text-gray); border: 1px solid #e2e8f0; }
.card-details { font-size: 13px; color: #718096; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
.card-bio { font-size: 15px; line-height: 1.6; color: #4a5568; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.card-tag { background: white; border: 1px solid var(--accent-orange); color: var(--accent-orange); padding: 4px 12px; border-radius: 20px; font-size: 13px; }

@media (max-width: 768px) { header { padding: 15px 20px; } }

/* 輸入框與下拉選單的過渡動畫 */
select, input[type="number"], input[type="text"], input[type="date"], .bio-input {
    transition: all 0.3s ease;
    border: 2px solid #e2e8f0; /* 加粗一點點邊框 */
    background-color: #f8fafc;
}

/* 當使用者點擊輸入框時的發光效果 */
select:focus, input[type="number"]:focus, input[type="text"]:focus, input[type="date"]:focus, .bio-input:focus {
    outline: none;
    border-color: var(--accent-orange);
    background-color: #ffffff;
    box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15); /* 外圈柔和光暈 */
    transform: translateY(-2px); /* 微微浮起 */
}

/* 單選與複選按鈕的點擊回饋 */
.radio-group label:active, .tag-label:active {
    transform: scale(0.95); /* 按下去的時候微微縮小 */
}

</style>
</head>

<body>

<header>
    <div class="logo-container" onclick="window.location.href='dashboard.html'">

        <div class="logo-text">Date Free</div>
    </div>

<main>
    <div class="photo-section">
        <div class="preview-box" id="previewBox">

        </div>

    <div class="section-header">

        <h3>真人身分驗證</h3>
        <p style="font-size: 13px; color: gray;">為確保平台安全，請上傳近期在學證明。審核通過後將獲得藍勾勾徽章。</p>

        <span style="margin-left:20px;">喝酒：</span><span class="radio-group"><label><input type="radio" name="drinking" value="不喝"> 不喝</label><label><input type="radio" name="drinking" value="小酌"> 小酌</label><label><input type="radio" name="drinking" value="頻繁"> 頻繁</label></span><br>
        <span style="margin-left:20px;">紋身：</span><span class="radio-group"><label><input type="radio" name="tattoo" value="是"> 是</label><label><input type="radio" name="tattoo" value="否"> 否</label></span>

<div class="card-modal" id="previewModal" onclick="closePreviewModal(event)">

                <h2 class="card-name"><span id="cardName"></span> <span id="cardVerified" style="display:none;" class="verified-icon" title="真人驗證">✔</span></h2>

                <span id="cardAge" style="font-weight:bold; color:var(--text-dark);"></span>

            </div>

                </div>

            <div class="card-tags" id="cardTags"></div>
        </div>
    </div>
</div>

<script>
const API_BASE = "/api";
const token = localStorage.getItem("token");

function isTokenExpired(t) {
    if (!t) return true;
    try { const payload = JSON.parse(atob(t.split('.')[1])); return (Date.now() >= payload.exp * 1000); } catch (e) { return true; }
}

if (isTokenExpired(token)) {
    alert("登入狀態已過期，請重新登入！");
    localStorage.removeItem("token"); localStorage.removeItem("user"); window.location.href = "index.html";
}

let currentBase64 = "";
let enrollmentCertBase64 = null;
let isVerifiedStatus = false; 

function setRadio(name, value) { if(!value) return; const el = document.querySelector(`input[name="${name}"][value="${value}"]`); if(el) el.checked = true; }
function getRadio(name) { const el = document.querySelector(`input[name="${name}"]:checked`); return el ? el.value : null; }

function bindTagEvent(checkbox) {
    checkbox.addEventListener('change', function() {
        if (this.checked) this.parentElement.classList.add('selected');
        else this.parentElement.classList.remove('selected');
    });
}
document.querySelectorAll('.tag-label input[type="checkbox"]').forEach(bindTagEvent);

function addCustomTag() {
    const val = document.getElementById("customTagInput").value.trim();
    if(!val) return;
    if(document.querySelector(`input[name="tags"][value="${val}"]`)) { alert("此標籤已存在！"); return; }
    
    const container = document.getElementById("tagsContainer");
    const label = document.createElement("label");
    label.className = "tag-label selected";
    label.innerHTML = `<input type="checkbox" name="tags" value="${val}" checked> #${val}`;
    bindTagEvent(label.querySelector('input'));
    container.appendChild(label);
    document.getElementById("customTagInput").value = "";
}

fetch(`${API_BASE}/profile`, { headers: { "Authorization": `Bearer ${token}` } })
.then(res => res.json())
.then(data => {
    if(data) {
        if(data.photo_base64) { currentBase64 = data.photo_base64; document.getElementById("previewBox").innerHTML = `<img src="${currentBase64}">`; }
        if(data.bio) document.getElementById("bioInput").value = data.bio;
        if(data.height) document.getElementById("heightInput").value = data.height;
        if(data.weight) document.getElementById("weightInput").value = data.weight;
        if(data.department) document.getElementById("deptInput").value = data.department;
        if(data.grade) document.getElementById("gradeInput").value = data.grade;
        if(data.mbti) document.getElementById("mbtiInput").value = data.mbti;
        if(data.birthday) document.getElementById("birthdayInput").value = data.birthday;
        if(data.hometown) document.getElementById("hometownInput").value = data.hometown;
        if(data.zodiac) document.getElementById("zodiacInput").value = data.zodiac;
        if(data.blood_type) document.getElementById("bloodTypeInput").value = data.blood_type;
        
        setRadio("gender", data.gender); setRadio("smoking", data.smoking); setRadio("drinking", data.drinking); setRadio("tattoo", data.tattoo);
        setRadio("pet", data.pet); setRadio("fitness", data.fitness); setRadio("diet", data.diet);
        
        if(data.tags && Array.isArray(data.tags)) {
            data.tags.forEach(tag => {
                const el = document.querySelector(`input[name="tags"][value="${tag}"]`);
                if (el) { el.checked = true; el.parentElement.classList.add('selected'); }
                else {
                    const container = document.getElementById("tagsContainer");
                    const label = document.createElement("label");
                    label.className = "tag-label selected";
                    label.innerHTML = `<input type="checkbox" name="tags" value="${tag}" checked> #${tag}`;
                    bindTagEvent(label.querySelector('input'));
                    container.appendChild(label);
                }
            });
        }
        
        if(data.enrollment_cert_base64) { 
            enrollmentCertBase64 = data.enrollment_cert_base64; 
            document.getElementById("enrollmentCertStatus").innerText = "已上傳 ✔"; 
            document.getElementById("enrollmentCertStatus").style.color = "green"; 
        }
        
        isVerifiedStatus = data.is_verified || false;
        if (data.is_verified) { 
            document.getElementById("verifyStatusBadge").innerHTML = "<span style='color:#1da1f2;'>✅ 您已通過真人身分驗證！</span>";
            } 
        else if (data.enrollment_cert_base64) { 
            document.getElementById("verifyStatusBadge").innerHTML = "<span style='color:#d97706;'>⏳ 證件已提交，等待人工審核中...</span>";
        } 
        else { 
            document.getElementById("verifyStatusBadge").innerHTML = "<span style='color:#e53e3e;'>❌ 尚未完成驗證</span>"; 
        }
    }
});

function handleImageUpload(inputId, callback) {
    document.getElementById(inputId).addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        if (file.size > 3 * 1024 * 1024) { alert("圖片請小於 3MB！"); return; }
        const reader = new FileReader();
        reader.onload = function(event) { callback(event.target.result); };
        reader.readAsDataURL(file);
    });
}
handleImageUpload('photoInput', (res) => { currentBase64 = res; document.getElementById("previewBox").innerHTML = `<img src="${currentBase64}">`; });
handleImageUpload('enrollmentCertInput', (res) => { 
    enrollmentCertBase64 = res; 
    document.getElementById("enrollmentCertStatus").innerText = "✔ 準備儲存"; 
    document.getElementById("enrollmentCertStatus").style.color = "orange"; 
});

function calculateAge(birthdayStr) {
    if(!birthdayStr) return '?';
    const birth = new Date(birthdayStr); const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) { age--; }
    return age;
}

function saveProfile() {
    const selectedTags = Array.from(document.querySelectorAll('input[name="tags"]:checked')).map(el => el.value);

    // 新增防呆機制：確保身高與體重是有效數字，如果沒填或填錯就送出 null
    const hInput = document.getElementById("heightInput").value;
    const wInput = document.getElementById("weightInput").value;
    const heightVal = (hInput && !isNaN(hInput)) ? parseInt(hInput) : null;
    const weightVal = (wInput && !isNaN(wInput)) ? parseInt(wInput) : null;

    const payload = {
        photo_base64: currentBase64, 
        bio: document.getElementById("bioInput").value || null, 
        gender: getRadio("gender"),
        height: heightVal,  // 使用處理過的安全數值
        weight: weightVal,  // 使用處理過的安全數值
        department: document.getElementById("deptInput").value || null, 
        grade: document.getElementById("gradeInput").value || null,
        smoking: getRadio("smoking"), 
        drinking: getRadio("drinking"), 
        tattoo: getRadio("tattoo"),
        enrollment_cert_base64: enrollmentCertBase64,
        mbti: document.getElementById("mbtiInput").value || null, 
        tags: selectedTags,
        birthday: document.getElementById("birthdayInput").value || null,
        hometown: document.getElementById("hometownInput").value || null,
        zodiac: document.getElementById("zodiacInput").value || null,
        blood_type: document.getElementById("bloodTypeInput").value || null,
        pet: getRadio("pet"), 
        fitness: getRadio("fitness"), 
        diet: getRadio("diet")
    };

    fetch(`${API_BASE}/profile`, { 
        method: "POST", 
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }, 
        body: JSON.stringify(payload) 
    })
    .then(res => res.json())
    .then(data => {
        if (data.detail) { 
            // 若再遇到錯誤，會將錯誤細節轉成文字印出，避免變成 [object Object]
            let errMsg = typeof data.detail === 'object' ? JSON.stringify(data.detail) : data.detail;
            alert("錯誤：" + errMsg); 
        } 
        else { 
            alert("資料已儲存！"); 
            window.location.href = "dashboard.html"; 
        }
    })
    .catch(() => alert("伺服器錯誤"));
}
function logout() { localStorage.removeItem("token"); localStorage.removeItem("user"); window.location.href = "index.html"; }
