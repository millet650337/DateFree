<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date Free | 大學生的自動配對交友平台</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root {
    --primary-blue: #2563eb;
    --accent-orange: #ff6b6b;
    --accent-gradient: linear-gradient(45deg, #ff6b6b, #ff8e53);
    --text-dark: #2d3748;
    --text-gray: #4a5568;
    --bg-light: #f8fafc;
}

body {
    margin: 0;
    font-family: 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(180deg, #ffffff 0%, #fff0f0 100%);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
}

/* ==========================
   導覽列 (Header)
========================== */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    background: transparent;
    max-width: 1200px;
    margin: 0 auto;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logo-diamond {
    width: 24px;
    height: 24px;
    border: 2px solid var(--text-dark);
    transform: rotate(45deg);
}

.logo-text {
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 1px;
}

.auth-btn {
    padding: 10px 24px;
    border: 1px solid var(--text-dark);
    background: transparent;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s ease;
}

.auth-btn:hover {
    background: var(--text-dark);
    color: white;
}

.user-box {
    display: none;
    align-items: center;
    gap: 15px;
}

.logout-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    background: #e2e8f0;
    cursor: pointer;
    transition: background 0.2s;
}
.logout-btn:hover {
    background: #cbd5e1;
}

/* ==========================
   主要內容區塊
========================== */
main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
}

.hero-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 65vh;
    flex-wrap: wrap;
    gap: 40px;
    padding: 40px 0;
}

.hero-text {
    flex: 1;
    min-width: 350px;
}

.hero-text h1 {
    font-size: 2.8rem;
    line-height: 1.3;
    margin-bottom: 20px;
    font-weight: normal;
}

.hero-text .brand-name {
    font-weight: 900;
    font-size: 3.5rem;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-text p {
    font-size: 1.25rem;
    color: var(--text-gray);
    line-height: 1.6;
}

.hero-graphic {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-width: 350px;
}

.diamond-placeholder {
    width: 280px;
    height: 280px;
    background: white;
    border: 2px solid var(--text-dark);
    transform: rotate(45deg);
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 20px 20px 0px rgba(255, 107, 107, 0.1);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.diamond-placeholder:hover {
    transform: rotate(45deg) scale(1.05);
}

.diamond-content {
    transform: rotate(-45deg);
    text-align: center;
    font-size: 1.8rem;
    color: var(--text-gray);
    line-height: 1.5;
}

.info-section {
    text-align: center;
    padding: 80px 40px;
    background: white;
    border-radius: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.04);
    margin-bottom: 80px;
    position: relative;
}

.info-section::before {
    content: '';
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 8px;
    background: var(--accent-gradient);
    border-radius: 4px;
}

.info-section p {
    font-size: 1.15rem;
    line-height: 1.8;
    color: var(--text-gray);
    margin: 0 auto 30px auto;
    max-width: 800px;
}

.info-section .highlight-text {
    font-size: 1.3rem;
    font-weight: bold;
    color: var(--text-dark);
    margin-top: 40px;
}

.info-section h2 {
    font-size: 2.8rem;
    color: var(--text-dark);
    margin-top: 50px;
    letter-spacing: 2px;
}

/* ==========================
   Modal (全新左右分割登入視窗)
========================== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal-content.auth-layout {
    display: flex;
    flex-direction: row;
    background: white;
    border-radius: 20px;
    width: 800px;
    max-width: 90%;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.close-btn-abs {
    position: absolute;
    top: 15px;
    right: 20px;
    background: none;
    border: none;
    font-size: 24px;
    color: #cbd5e1;
    cursor: pointer;
    z-index: 10;
    transition: color 0.3s;
}
.close-btn-abs:hover {
    color: var(--text-dark);
}

/* 左側：大菱形區塊 */
.auth-left {
    flex: 1;
    background: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 80px 40px;
    border-right: 1px solid #f1f5f9;
}

.auth-diamond {
    width: 200px;
    height: 200px;
    background: white;
    border: 2px solid var(--text-dark);
    transform: rotate(45deg);
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 15px 15px 0px rgba(255, 107, 107, 0.08);
}

.auth-diamond-text {
    transform: rotate(-45deg);
    text-align: center;
}

.auth-diamond-text .title {
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 4px;
    color: var(--text-dark);
}

.auth-diamond-text hr {
    width: 100px;
    border: none;
    border-top: 2px solid var(--text-dark);
    margin: 10px auto;
}

/* 右側：Google登入按鈕區塊 */
.auth-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 40px;
    background: white;
}

.auth-right h3 {
    margin-top: 0;
    margin-bottom: 30px;
    color: var(--text-dark);
    font-weight: normal;
    font-size: 20px;
}

/* RWD 響應式微調 */
@media (max-width: 768px) {
    header { padding: 15px 20px; }
    main { padding: 0 20px; }
    .hero-section { text-align: center; padding: 20px 0 60px 0; }
    .hero-text h1 { font-size: 2.2rem; }
    .hero-text .brand-name { font-size: 2.8rem; }
    .info-section h2 { font-size: 2rem; }
    .diamond-placeholder { width: 220px; height: 220px; }
    
    /* 登入視窗改為上下排列 */
    .modal-content.auth-layout { flex-direction: column; width: 400px; }
    .auth-left { padding: 50px 20px; border-right: none; border-bottom: 1px solid #f1f5f9; }
    .auth-right { padding: 50px 20px; }
    .auth-diamond { width: 140px; height: 140px; }
    .auth-diamond-text .title { font-size: 24px; }
    .auth-diamond-text hr { width: 70px; }
}
</style>
</head>

<body>

<header>
    <div class="logo-container">
        <div class="logo-diamond"></div>
        <div class="logo-text">LOGO</div>
    </div>

    <button id="loginBtn" class="auth-btn" onclick="openModal()">登入 / 註冊</button>

    <div class="user-box" id="userBox">
        <span id="userName"></span>
        <button class="logout-btn" onclick="logout()">登出</button>
    </div>
</header>

<main>
    <section class="hero-section">
        <div class="hero-text">
            <h1><span class="brand-name">Date Free</span><br>大學生的自動配對交友平台</h1>
            <p>不用左滑右滑，填寫問卷由大數據幫你找出屬於你的靈魂伴侶</p>
        </div>
        <div class="hero-graphic">
            <div class="diamond-placeholder">
                <div class="diamond-content">圖片或<br>LOGO</div>
            </div>
        </div>
    </section>

    <section class="info-section">
        <p>專為台中大學學生打造的『高效率三觀媒合系統』，我們透過6大維度深度演<br>算與學生身份驗證，排除外貌與隨機滑動的社交雜訊，將線上配對精準轉化為<br>線下真實赴約，為校園社交進行降噪，找回靈魂契合的深度連結。</p>
        
        <p class="highlight-text">我們不玩隨機盲滑，而是主打『每週一次精準開獎』<br>結合『200元約會補貼金』獎勵線下見面。</p>
        
        <h2>你們約會，我們買單！</h2>
    </section>
</main>

<div class="modal" id="modal">
    <div class="modal-content auth-layout">
        <button class="close-btn-abs" onclick="closeModal()">✕</button>
        
        <div class="auth-left">
            <div class="auth-diamond">
                <div class="auth-diamond-text">
                    <div class="title">登入</div>
                    <hr>
                    <div class="title">註冊</div>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <h3>快速驗證身分</h3>
            
            <div id="g_id_onload"
                data-client_id="460379161583-tdkqba7mu0pd1b6haf2qcqs297ghqpds.apps.googleusercontent.com"
                data-callback="handleCredentialResponse">
            </div>

            <div class="g_id_signin"
                data-type="standard"
                data-size="large"
                data-theme="outline"
                data-text="sign_in_with"
                data-shape="rectangular"
                data-logo_alignment="left">
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = "/api";

const modal = document.getElementById("modal");
const loginBtn = document.getElementById("loginBtn");
const userBox = document.getElementById("userBox");
const userName = document.getElementById("userName");

// ==========================
// Modal 控制
// ==========================
function openModal() {
    modal.style.display = "flex";
}
function closeModal() {
    modal.style.display = "none";
}

// ==========================
// Google 登入成功處理
// ==========================
function handleCredentialResponse(response) {
    fetch(`${API_BASE}/auth/google`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            credential: response.credential
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.detail) {
            alert("登入失敗：" + data.detail);
            return;
        }

       // ✅ 存 token + user
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        updateUI();
        closeModal();

        // ✅ 登入成功後，自動跳轉到主控台
        window.location.href = "dashboard.html";
    });
}

// ==========================
// UI 更新
// ==========================
function updateUI() {
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user"));

   if (token && user) {
        // 如果已經登入，直接幫他跳轉到 dashboard
        window.location.href = "dashboard.html";
        
        loginBtn.style.display = "none";
        userBox.style.display = "flex";
        userName.innerText = user.name + " (" + user.email + ")";
    }
}

// ==========================
// 登出
// ==========================
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");

    loginBtn.style.display = "block";
    userBox.style.display = "none";
}

// ==========================
// 頁面載入檢查登入狀態
// ==========================
window.onload = function() {
    updateUI();
}

// 點擊背景黑灰處關閉
window.onclick = function(e) {
    if (e.target == modal) closeModal();
}
</script>

</body>
</html>
