<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date Free</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root {
    --primary-blue: #2563eb;
    --accent-orange: #ff6b6b;
    --bg-light: #f8fafc;
}
body {
    margin:0;
    font-family: 'Microsoft JhengHei';
    background: var(--bg-light);
}
header {
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:white;
}
.logo {
    font-weight:bold;
    font-size:24px;
}
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* 使用者資訊 */
.user-box {
    display:none;
    align-items:center;
    gap:10px;
}
.logout-btn {
    background:#eee;
}

/* Modal */
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}
.modal-content {
    background:white;
    padding:30px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    <div class="logo">Date Free</div>

    <!-- 未登入 -->
    <button id="loginBtn" onclick="openModal()">登入</button>

    <!-- 已登入 -->
    <div class="user-box" id="userBox">
        <span id="userName"></span>
        <button class="logout-btn" onclick="logout()">登出</button>
    </div>
</header>

<section style="text-align:center; margin-top:80px;">
    <h1>找到真正適合你的人 ❤️</h1>
    <p id="welcomeText">請先登入開始配對</p>
</section>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">

        <h3>使用 Google 登入</h3>

        <div id="g_id_onload"
            data-client_id="460379161583-tdkqba7mu0pd1b6haf2qcqs297ghqpds.apps.googleusercontent.com"
            data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"
            data-type="standard"
            data-size="large">
        </div>

        <br>
        <button onclick="closeModal()">關閉</button>
    </div>
</div>

<script>
const API_BASE = "/api";

const modal = document.getElementById("modal");
const loginBtn = document.getElementById("loginBtn");
const userBox = document.getElementById("userBox");
const userName = document.getElementById("userName");
const welcomeText = document.getElementById("welcomeText");

// ==========================
// Modal
// ==========================
function openModal() {
    modal.style.display = "flex";
}
function closeModal() {
    modal.style.display = "none";
}

// ==========================
// Google 登入成功
// ==========================
function handleCredentialResponse(response) {

    fetch(`${API_BASE}/auth/google`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            credential: response.credential
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.detail) {
            alert("登入失敗：" + data.detail);
            return;
        }

        // ✅ 存 token + user
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        updateUI();

        closeModal();
    });
}

// ==========================
// UI 更新
// ==========================
function updateUI() {

    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user"));

    if (token && user) {
        loginBtn.style.display = "none";
        userBox.style.display = "flex";

        userName.innerText = user.name + " (" + user.email + ")";
        welcomeText.innerText = "歡迎回來 " + user.name + " 🎉";
    }
}

// ==========================
// 登出
// ==========================
function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("user");

    loginBtn.style.display = "block";
    userBox.style.display = "none";

    welcomeText.innerText = "請先登入開始配對";
}

// ==========================
// 頁面載入檢查登入
// ==========================
window.onload = function() {
    updateUI();
}

// 點外面關閉
window.onclick = function(e) {
    if (e.target == modal) closeModal();
}
</script>

</body>
</html>
